name: Update event calendars

"on":
  push:
    branches:
      - main

  workflow_dispatch: {}

  schedule:
    - cron: "15 10 * * *"

permissions:
  contents: write

jobs:
  update-calendars:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build calendar files
        run: python update_calendars.py

      - name: Commit updated calendars
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add colorado-symphony.ics dazzle-jazz.ics
          git commit -m "Update event calendars" || echo "No changes"
          git push